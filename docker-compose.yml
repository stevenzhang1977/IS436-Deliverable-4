services:
  db:
    image: mysql:8.0
    container_name: my_project_db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: waitlist_system
      MYSQL_USER: student
      MYSQL_PASSWORD: student123
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d

volumes:
  db_data: